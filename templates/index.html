<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔎 TruthLens – See Every Side</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <!-- Main Left Card -->
    <main class="big-card">

        <!-- Search & Filters -->
        <section class="card-header">

            <input 
                type="text" 
                id="search" 
                placeholder="Search global news, topics, or keywords..."
                autocomplete="off"
            >

            <div class="filters">

                <!-- Country Selection -->
                <select id="country">
                    <option value="">🌍 Global</option>
                    <option value="us">🇺🇸 United States</option>
                    <option value="in">🇮🇳 India</option>
                    <option value="gb">🇬🇧 United Kingdom</option>
                    <option value="ca">🇨🇦 Canada</option>
                    <option value="au">🇦🇺 Australia</option>
                    <option value="de">🇩🇪 Germany</option>
                    <option value="fr">🇫🇷 France</option>
                    <option value="jp">🇯🇵 Japan</option>
                    <option value="cn">🇨🇳 China</option>
                    <option value="ru">🇷🇺 Russia</option>
                    <option value="br">🇧🇷 Brazil</option>
                    <option value="za">🇿🇦 South Africa</option>
                    <option value="ae">🇦🇪 UAE</option>
                    <option value="sg">🇸🇬 Singapore</option>
                </select>

                <!-- Category Selection (aligned with News API) -->
                <select id="category">
                    <option value="">📰 All Categories</option>
                    <option value="general">Top Headlines</option>
                    <option value="business">Business & Finance</option>
                    <option value="technology">Technology</option>
                    <option value="science">Science & Space</option>
                    <option value="health">Health & Medicine</option>
                    <option value="politics">Politics</option>
                    <option value="world">World Affairs</option>
                    <option value="sports">Sports</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="climate">Climate & Environment</option>
                    <option value="cybersecurity">Cybersecurity</option>
                    <option value="economy">Economy</option>
                </select>

                <button id="searchBtn">🔍 Search</button>
            </div>
        </section>

        <!-- Trending -->
        <section class="trending-tags">
            <button onclick="quickSearch('AI')">#AI</button>
            <button onclick="quickSearch('Elections')">#Elections</button>
            <button onclick="quickSearch('Climate Change')">#Climate</button>
            <button onclick="quickSearch('Stock Market')">#Markets</button>
            <button onclick="quickSearch('Cybersecurity')">#Cybersecurity</button>
            <button onclick="quickSearch('US & IRAN War')">#IRAN</button>
        </section>

        <!-- News Results -->
        <section id="news-container" class="news-scroll">

            <!-- Loading State -->
            <div id="loading-state" class="state-message hidden" aria-live="polite">
                🔄 Fetching latest news...
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="state-message" aria-live="polite">
                No news loaded. Start by searching or selecting filters.
            </div>

        </section>

        <!-- Bias / Perspectives Section -->
        <section id="bias-section" class="bias-section hidden">
            <h2 class="bias-title">🧭 News Perspectives</h2>
            
            <div class="bias-grid" id="bias-container">
        <!-- JS will fill this -->
           </div>
        </section>

    </main>

</div>

<script src="/static/script.js"></script>
</body>
</html>
